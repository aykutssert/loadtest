name: CI

on:
  push:
  pull_request:

jobs:
  build-api:
    name: Build API (C# .NET 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - run: dotnet build
        working-directory: api

  build-worker:
    name: Build Worker (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go build ./...
        working-directory: worker
